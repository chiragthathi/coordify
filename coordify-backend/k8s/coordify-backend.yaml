apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: coordify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: coordify/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              value: mongodb://mongodb:27017
            - name: MONGODB_DB_NAME
              value: coordify_api_gateway_service
            - name: REDIS_CACHE_ENABLED
              value: "true"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PROXY_TIMEOUT_MS
              value: "20000"
            - name: RATE_LIMIT_MAX
              value: "100000"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:4001
            - name: PROJECTS_SERVICE_URL
              value: http://projects-service:4002
            - name: TASKS_SERVICE_URL
              value: http://tasks-service:4003
            - name: TEAM_SERVICE_URL
              value: http://team-service:4004
            - name: NOTIFICATIONS_SERVICE_URL
              value: http://notifications-service:4005
            - name: REPORTS_SERVICE_URL
              value: http://reports-service:4006
            - name: SETTINGS_SERVICE_URL
              value: http://settings-service:4007
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
