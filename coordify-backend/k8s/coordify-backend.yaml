apiVersion: v1
kind: Namespace
metadata:
  name: coordify
---
apiVersion: v1
kind: Secret
metadata:
  name: coordify-secrets
  namespace: coordify
type: Opaque
stringData:
  JWT_SECRET: replace-this-secret
  GEMINI_API_KEY: replace-with-real-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: coordify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: coordify
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: coordify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: coordify
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: coordify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: coordify
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: coordify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: coordify/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: coordify-secrets
                  key: JWT_SECRET
            - name: MONGODB_URI
              value: mongodb://mongodb:27017
            - name: MONGODB_DB_NAME
              value: coordify_auth_service
            - name: REDIS_TOKEN_STORE_ENABLED
              value: "true"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: RABBITMQ_ENABLED
              value: "true"
            - name: RABBITMQ_URL
              value: amqp://rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: coordify
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
