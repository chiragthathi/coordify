apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-load-balancer
  namespace: coordify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-load-balancer
  template:
    metadata:
      labels:
        app: api-load-balancer
    spec:
      containers:
        - name: api-load-balancer
          image: coordify/api-load-balancer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4100
          env:
            - name: PORT
              value: "4100"
            - name: UPSTREAMS
              value: http://api-gateway:4000
            - name: UPSTREAM_TIMEOUT_MS
              value: "8000"
            - name: UPSTREAM_RETRY_ATTEMPTS
              value: "1"
            - name: UPSTREAM_UNHEALTHY_COOLDOWN_MS
              value: "15000"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 4100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4100
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
