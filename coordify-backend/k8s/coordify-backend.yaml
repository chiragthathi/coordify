apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-service
  namespace: coordify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasks-service
  template:
    metadata:
      labels:
        app: tasks-service
    spec:
      containers:
        - name: tasks-service
          image: coordify/tasks-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              value: mongodb://mongodb:27017
            - name: MONGODB_DB_NAME
              value: coordify_tasks_service
            - name: REDIS_CACHE_ENABLED
              value: "true"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: REDIS_CACHE_TTL_SECONDS
              value: "120"
            - name: RABBITMQ_ENABLED
              value: "true"
            - name: RABBITMQ_URL
              value: amqp://rabbitmq:5672
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 700m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tasks-service
  namespace: coordify
spec:
  selector:
    app: tasks-service
  ports:
    - port: 4003
      targetPort: 4003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tasks-service-hpa
  namespace: coordify
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tasks-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
